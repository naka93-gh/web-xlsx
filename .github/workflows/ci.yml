name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # ライブラリ実行下限は 20.12（engines）だが、テスト実行系（vitest/vite/rolldown）は
        # Node ^20.19 || >=22.12 を要求するため、CI の 20.x 下限は 20.19 に合わせる
        node-version: ['20.19', '22', '24']
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
