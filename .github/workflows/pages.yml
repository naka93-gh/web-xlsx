name: Deploy demo to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pages を自動で有効化（Settings で未設定でも作成を試みる）
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # src を1ファイルにバンドルして examples に出力（examples ディレクトリをそのまま公開）
      - run: pnpm exec esbuild src/index.ts --bundle --minify --format=esm --target=es2020 --outfile=examples/web-xlsx.js
      - uses: actions/upload-pages-artifact@v3
        with:
          path: examples

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
